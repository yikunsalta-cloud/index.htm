<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora YIKUN</title>

<style>

:root{
    --verde:#ACEC00;
    --azul:#013FF6;
    --azulOscuro:#00182E;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:var(--azulOscuro);
    color:white;
}

header{
    background:var(--azul);
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.container{
    padding:15px;
}

.card{
    background:white;
    color:black;
    padding:20px;
    margin-bottom:15px;
    border-radius:15px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

.card:hover{
    transform:scale(1.02);
}

.screen{
    display:none;
}

.active{
    display:block;
}

.back-btn{
    background:var(--verde);
    color:black;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    font-weight:bold;
    margin-bottom:15px;
    cursor:pointer;
}

</style>
</head>

<body>

<header>
📋 CALCULADORA YIKUN 📋
</header>

<div id="inicio" class="container active">

    <div class="card" onclick="abrir('banderas')">
        🚩 Banderas
    </div>

    <div class="card" onclick="abrir('banners')">
        📢 Banners
    </div>

    <div class="card" onclick="abrir('vinilos')">
        🎨 Vinilos
    </div>

    <div class="card" onclick="abrir('afiches')">
        📰 Afiches
    </div>

</div>

<div id="banderas" class="container screen">

    <button class="back-btn" onclick="volver()">
        ← Volver
    </button>

    <div class="card">
        🚩 145 Sin Costura
    </div>

    <div class="card">
        🚩 145 Con Costura
    </div>

    <div class="card">
        🚩 2.00 mts
    </div>

    <div class="card">
        🚩 2.90 mts
    </div>

    <div class="card">
        🚩 4.30 mts
    </div>

</div>

<div id="banners" class="container screen">

    <button class="back-btn" onclick="volver()">
        ← Volver
    </button>

    <div class="card">
        📢 Banner Común
    </div>

    <div class="card">
        💡 Banner Luminoso
    </div>

</div>

<div id="vinilos" class="container screen">

    <button class="back-btn" onclick="volver()">
        ← Volver
    </button>

    <div class="card">
        🎨 Calculadora de Vinilos
    </div>

</div>

<div id="afiches" class="container screen">

    <button class="back-btn" onclick="volver()">
        ← Volver
    </button>

    <div class="card">
        📰 Calculadora de Afiches
    </div>

</div>

<script>

function abrir(id){

    document.querySelectorAll('.container')
    .forEach(div=>{
        div.classList.remove('active');
        div.classList.add('screen');
    });

    document.getElementById(id)
    .classList.remove('screen');

    document.getElementById(id)
    .classList.add('active');
}

function volver(){

    document.querySelectorAll('.container')
    .forEach(div=>{
        div.classList.remove('active');
        div.classList.add('screen');
    });

    document.getElementById('inicio')
    .classList.remove('screen');

    document.getElementById('inicio')
    .classList.add('active');
}

</script>

</body>
</html>
</body>
</html>
