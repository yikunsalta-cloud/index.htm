<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora YIKUN</title>

<style>

:root{
    --verde:#ACEC00;
    --azul:#013FF6;
    --azulOscuro:#00182E;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:var(--azulOscuro);
    color:white;
}

header{
    background:var(--azul);
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.container{
    padding:15px;
}

.card{
    background:white;
    color:black;
    padding:20px;
    margin-bottom:15px;
    border-radius:15px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

.card:hover{
    transform:scale(1.02);
}

.screen{
    display:none;
}

.active{
    display:block;
}

.back-btn{
    background:var(--verde);
    color:black;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    font-weight:bold;
    margin-bottom:15px;
    cursor:pointer;
}

</style>
</head>

<body>

<header>
📋 CALCULADORA YIKUN 📋
</header>

<div id="inicio" class="container active">

    <div class="card" onclick="abrir('banderas')">
        🚩 Banderas
    </div>

    <div class="card" onclick="abrir('banners')">
        📢 Banners
    </div>

    <div class="card" onclick="abrir('vinilos')">
        🎨 Vinilos
    </div>

    <div class="card" onclick="abrir('afiches')">
        📰 Afiches
    </div>

</div>

<div id="banderas" class="container screen">
<div id="calc145sin" class="container screen">

<button class="back-btn" onclick="abrir('banderas')">
← Volver
</button>

<h2>🚩 145 Sin Costura</h2>

<br>

<label>Largo (mts)</label>

<input
type="number"
id="largo145sin"
step="0.01"
style="width:100%;padding:12px;border-radius:10px;">

<br><br>

<button
class="back-btn"
onclick="calcular145Sin()">

CALCULAR

</button>

<div id="resultado145sin"></div>

</div>
    <button class="back-btn" onclick="volver()">
        ← Volver
    </button>

  <div class="card" onclick="abrir('calc145sin')">
🚩 145 Sin Costura
</div>

    <div class="card">
        🚩 145 Con Costura
    </div>

    <div class="card">
        🚩 2.00 mts
    </div>

    <div class="card">
        🚩 2.90 mts
    </div>

    <div class="card">
        🚩 4.30 mts
    </div>

</div>

<div id="banners" class="container screen">

    <button class="back-btn" onclick="volver()">
        ← Volver
    </button>

    <div class="card">
        📢 Banner Común
    </div>

    <div class="card">
        💡 Banner Luminoso
    </div>

</div>

<div id="vinilos" class="container screen">

    <button class="back-btn" onclick="volver()">
        ← Volver
    </button>

    <div class="card">
        🎨 Calculadora de Vinilos
    </div>

</div>

<div id="afiches" class="container screen">

    <button class="back-btn" onclick="volver()">
        ← Volver
    </button>

    <div class="card">
        📰 Calculadora de Afiches
    </div>

</div>

<script>
const MATERIAL_145 = 13000;
const DISENO_145 = 12000;
const EXCEDENTE_145 = 0.50;

function redondear(valor){

return Math.ceil(valor/1000)*1000;

}

function calcular145Sin(){

let largo =
parseFloat(
document.getElementById("largo145sin").value
);

if(!largo){

alert("Ingrese un largo");

return;

}

let tela =
largo + EXCEDENTE_145;

let total =
(tela * MATERIAL_145)
+
DISENO_145;

total =
redondear(total);

document.getElementById(
"resultado145sin"
).innerHTML =

`
<div class="card">

<p><b>Medida:</b>
1.45 x ${largo.toFixed(2)}</p>

<p><b>Total:</b>
$${total.toLocaleString('es-AR')}</p>

<button
class="back-btn"
onclick="copiar145Sin(
'1.45 x ${largo.toFixed(2)}',
'${total.toLocaleString('es-AR')}'
)">
📋 Copiar Presupuesto
</button>

</div>
`;

}
</script>

</body>
</html>
</body>
</html>
