<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora YIKUN</title>

<style>

:root{
    --verde:#ACEC00;
    --azul:#013FF6;
    --azulOscuro:#00182E;
    --blanco:#FFFFFF;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:var(--azulOscuro);
    color:white;
}

header{
    background:var(--azul);
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.container{
    padding:15px;
}

.card{
    background:white;
    color:#00182E;
    border-radius:15px;
    padding:20px;
    margin-bottom:15px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.02);
}

.screen{
    display:none;
}

.active{
    display:block;
}

.back-btn{
    background:var(--verde);
    color:black;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    font-weight:bold;
    margin-bottom:15px;
    cursor:pointer;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:5px;
    margin-bottom:15px;
}

.resultado{
    background:white;
    color:black;
    padding:15px;
    border-radius:15px;
    margin-top:15px;
}

.total{
    font-size:30px;
    font-weight:bold;
    color:var(--azul);
}

.boton{
    width:100%;
    background:var(--verde);
    color:black;
    border:none;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
    font-weight:bold;
    cursor:pointer;
}

</style>

</head>

<body>

<header>
📋 CALCULADORA YIKUN
</header>

<!-- INICIO -->

<div id="inicio" class="container active">

    <div class="card" onclick="abrirPantalla('banderas')">
        🚩 Banderas
    </div>

    <div class="card" onclick="abrirPantalla('banners')">
        📢 Banners
    </div>

    <div class="card" onclick="abrirPantalla('vinilos')">
        🎨 Vinilos
    </div>

    <div class="card" onclick="abrirPantalla('afiches')">
        📰 Afiches
    </div>

</div>

<!-- 145 SIN COSTURA -->

<div id="bandera145sin" class="container screen">

<button class="back-btn" onclick="abrirPantalla('banderas')">
← Volver
</button>

<h2>🚩 145 Sin Costura</h2>

<label>Largo (mts)</label>
<input type="number" id="largo145sin" step="0.01">

<button class="boton" onclick="calcular145Sin()">
Calcular
</button>

<div class="resultado">

<p>Medida:</p>
<p id="medida145sin">-</p>

<p>Tela Utilizada:</p>
<p id="tela145sin">-</p>

<div class="total" id="total145sin">
$0
</div>

<button class="boton" onclick="copiarPresupuesto145Sin()">
📋 Copiar Presupuesto
</button>

<button class="boton" onclick="whatsapp145Sin()">
📲 Enviar WhatsApp
</button>

</div>

</div>


<!-- 145 CON COSTURA -->

<div id="bandera145con" class="container screen">

<button class="back-btn" onclick="abrirPantalla('banderas')">
← Volver
</button>

<h2>🚩 145 Con Costura</h2>

<label>Largo (mts)</label>
<input type="number" id="largo145con" step="0.01">

<button class="boton" onclick="calcular145Con()">
Calcular
</button>

<div class="resultado">

<p>Medida:</p>
<p id="medida145con">-</p>

<p>Tela Utilizada:</p>
<p id="tela145con">-</p>

<p>Costura:</p>
<p id="costura145con">-</p>

<div class="total" id="total145con">
$0
</div>

<button class="boton" onclick="copiarPresupuesto145Con()">
📋 Copiar Presupuesto
</button>

<button class="boton" onclick="whatsapp145Con()">
📲 Enviar WhatsApp
</button>

</div>

</div>
    
<!-- BANNERS -->

<div id="banners" class="container screen">

<button class="back-btn" onclick="volverInicio()">
← Volver
</button>

<div class="card">
📢 Banner Común
</div>

<div class="card">
💡 Banner Luminoso
</div>

</div>

<!-- VINILOS -->

<div id="vinilos" class="container screen">

<button class="back-btn" onclick="volverInicio()">
← Volver
</button>

<h2>🎨 Vinilos</h2>

</div>

<!-- AFICHES -->

<div id="afiches" class="container screen">

<button class="back-btn" onclick="volverInicio()">
← Volver
</button>

<h2>📰 Afiches</h2>

</div>

<script>

function abrirPantalla(id){

    document.querySelectorAll('.container')
    .forEach(p=>{
        p.classList.remove('active');
        p.classList.add('screen');
    });

    document.getElementById(id)
    .classList.remove('screen');

    document.getElementById(id)
    .classList.add('active');
}

function volverInicio(){

    document.querySelectorAll('.container')
    .forEach(p=>{
        p.classList.remove('active');
        p.classList.add('screen');
    });

    document.getElementById('inicio')
    .classList.remove('screen');

    document.getElementById('inicio')
    .classList.add('active');
}

</script>

</body>
</html>
