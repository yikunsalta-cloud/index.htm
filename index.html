<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Calculadora YIKUN</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#00182E;color:#fff;min-height:100vh;padding:18px}.app{max-width:520px;margin:auto}.top{padding:18px 4px 12px;text-align:center}.top h1{margin:0;font-size:28px;letter-spacing:.5px}.top p{margin:8px 0 0;color:#d7e4ef;font-size:14px}.card{background:#fff;color:#000;border-radius:24px;padding:18px;box-shadow:0 18px 45px rgba(0,0,0,.35)}.section{border:1px solid #e7e7e7;border-radius:18px;padding:14px;margin-bottom:14px;background:#fafafa}.section-title{font-size:13px;font-weight:700;color:#00182E;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}.field{margin:10px 0}label{display:block;font-size:14px;font-weight:700;margin-bottom:6px;color:#00182E}select,input{width:100%;padding:14px 13px;border:1px solid #d7d7d7;border-radius:14px;background:#fff;font-size:16px;outline:none}select:focus,input:focus{border-color:#ACEC00;box-shadow:0 0 0 3px rgba(172,236,0,.25)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{width:100%;border:0;border-radius:16px;padding:15px 12px;margin:6px 0;font-size:15px;font-weight:800;cursor:pointer}.primary{background:#ACEC00;color:#00182E;box-shadow:0 8px 18px rgba(172,236,0,.35)}.secondary{background:#00182E;color:#fff}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.res{display:none;margin:14px 0;padding:16px;border-radius:18px;background:#00182E;color:#fff;text-align:center}.res small{display:block;color:#d7e4ef;margin-bottom:4px}.res b{font-size:28px;color:#ACEC00}.note{font-size:12px;text-align:center;color:#555;margin-top:10px}@media(max-width:420px){.grid,.actions{grid-template-columns:1fr}.top h1{font-size:24px}}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <h1>Calculadora YIKUN</h1>
    <p>Presupuestos rápidos para banners, vinilos, afiches y banderas.</p>
  </div>
  <div class="card">
    <div class="section">
      <div class="section-title">Tipo de producto</div>
      <select id="tipo" onchange="campos()">
        <option value="145sin">Bandera 145 Sin Costura</option>
        <option value="145con">Bandera 145 Con Costura</option>
        <option value="200">Bandera 2.00</option>
        <option value="290">Bandera 2.90</option>
        <option value="430">Bandera 4.30</option>
        <option value="banner">Banner</option>
        <option value="luminoso">Banner Luminoso</option>
        <option value="vinilo">Vinilo</option>
        <option value="afiche">Afiche</option>
      </select>
    </div>

    <div class="section" id="largoBox">
      <div class="section-title">Medida</div>
      <div class="field">
        <label>Largo en metros</label>
        <input id="largo" type="number" step="0.01" placeholder="Ej: 5">
      </div>
    </div>

    <div class="section" id="anchoBox" style="display:none">
      <div class="section-title">Medidas</div>
      <div class="grid">
        <div class="field">
          <label>Ancho</label>
          <input id="ancho" type="number" step="0.01" placeholder="Ej: 1.45">
        </div>
        <div class="field">
          <label>Alto</label>
          <input id="alto" type="number" step="0.01" placeholder="Ej: 2">
        </div>
      </div>
    </div>

    <button class="btn primary" onclick="calcular()">CALCULAR</button>
    <div id="res" class="res"></div>
    <div class="actions">
      <button class="btn secondary" onclick="copiar()">Copiar</button>
      <button class="btn secondary" onclick="wa()">WhatsApp</button>
    </div>
    <div class="note">Presupuesto válido por 7 días.</div>
  </div>
</div>

<script>
const CFG={
 '145sin':{e:.5,m:13000,d:12000,ancho:1.45,panos:1,n:'Bandera 145 Sin Costura'},
 '145con':{e:.5,m:13000,d:12000,c:3000,ancho:1.45,panos:1,n:'Bandera 145 Con Costura'},
 '200':{e:.2,m:13000,d:12000,c:3000,ancho:2.00,panos:2,n:'Bandera 2.00'},
 '290':{e:.5,m:13000,d:12000,c:3000,ancho:2.90,panos:2,n:'Bandera 2.90'},
 '430':{e:.8,m:13000,d:12000,c:3000,ancho:4.30,panos:3,n:'Bandera 4.30'},
 'banner':{e:.5,m:12000,d:12000,n:'Banner'},
 'luminoso':{e:.2,m:20000,d:12000,n:'Banner Luminoso'},
 'vinilo':{e:.2,m:12000,d:12000,n:'Vinilo'},
 'afiche':{e:.2,m:9500,d:12000,n:'Afiche'}
};
let texto='';
const $=id=>document.getElementById(id);
function campos(){
 let t=$('tipo').value,b=['banner','luminoso','vinilo','afiche'].includes(t);
 $('anchoBox').style.display=b?'block':'none';
 $('largoBox').style.display=b?'none':'block';
 $('res').style.display='none';texto='';
}
function r(v){return Math.ceil(v/1000)*1000}
function money(v){return v.toLocaleString('es-AR')}
function error(msg){$('res').style.display='block';$('res').innerHTML='<small>Atención</small><b style="font-size:18px">'+msg+'</b>'}
function calcular(){
 let t=$('tipo').value,c=CFG[t],total=0,med='';
 if(['banner','luminoso','vinilo','afiche'].includes(t)){
  let a=parseFloat($('ancho').value),h=parseFloat($('alto').value);
  if(!a||!h||a<=0||h<=0){error('Ingresá ancho y alto');return}
  total=r(((a*h)+c.e)*c.m+c.d);
  med=a.toFixed(2)+' x '+h.toFixed(2);
 }else{
  let l=parseFloat($('largo').value);
  if(!l||l<=0){error('Ingresá el largo');return}
  total=(((c.panos||1)*l)+c.e)*c.m+c.d;
  if(c.c){total+=((l*2)+(c.ancho*2))*c.c}
  total=r(total);
  med=c.ancho.toFixed(2)+' x '+l.toFixed(2);
 }
 $('res').style.display='block';
 $('res').innerHTML='<small>Total estimado</small><b>$'+money(total)+'</b>';
 texto='📋 *PRESUPUESTO YIKUN* 📋\n\n📦 *PEDIDO:* '+c.n+'\n\n📐 *MEDIDA:* '+med+'\n\n💰 *TOTAL:* $'+money(total)+'\n\n⚠️ *PRESUPUESTO VÁLIDO 7 DÍAS* ⚠️';
}
function copiar(){
 if(!texto){alert('Primero calculá un presupuesto.');return}
 navigator.clipboard.writeText(texto);alert('Copiado');
}
function wa(){
 if(!texto){alert('Primero calculá un presupuesto.');return}
 window.open('https://wa.me/?text='+encodeURIComponent(texto));
}
campos();
</script>
</body>
</html>
