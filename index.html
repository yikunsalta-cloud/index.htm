<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Calculadora YIKUN</title>
<style>
:root{--azul:#00182E;--verde:#ACEC00;--blanco:#fff;--gris:#f4f6f8;--negro:#101010}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:var(--azul);color:var(--blanco);padding:18px}
.app{max-width:520px;margin:auto;background:var(--blanco);color:var(--negro);border-radius:22px;overflow:hidden;box-shadow:0 18px 45px rgba(0,0,0,.35)}
.head{background:var(--azul);color:var(--blanco);padding:24px 18px;text-align:center;border-bottom:6px solid var(--verde)}
.head h2{margin:0;font-size:26px;letter-spacing:.5px}.head p{margin:6px 0 0;font-size:13px;opacity:.85}
.content{padding:18px;background:var(--gris)}
.box{background:var(--blanco);border-radius:18px;padding:14px;margin-bottom:13px;box-shadow:0 6px 18px rgba(0,0,0,.08)}
label{display:block;font-size:13px;font-weight:bold;margin-bottom:6px;color:#333}
select,input{width:100%;padding:13px;border:1px solid #ddd;border-radius:12px;font-size:16px;background:#fff;outline:none}
select:focus,input:focus{border-color:var(--verde);box-shadow:0 0 0 3px rgba(172,236,0,.25)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{width:100%;padding:14px;border:0;border-radius:14px;font-weight:bold;font-size:15px;cursor:pointer;margin-top:9px}
.btn-main{background:var(--verde);color:#111}.btn-dark{background:var(--azul);color:#fff}.btn-line{background:#fff;color:#111;border:2px solid var(--verde)}
#res{background:var(--azul);color:#fff;border-radius:18px;padding:18px;text-align:center;font-size:28px;font-weight:bold;margin:12px 0;min-height:68px;display:flex;align-items:center;justify-content:center}
.note{font-size:12px;color:#666;text-align:center;margin-top:8px}.hide{display:none}
@media(max-width:420px){body{padding:10px}.grid{grid-template-columns:1fr}.head h2{font-size:23px}}
</style>
</head>
<body>
<div class="app">
 <div class="head"><h2>📋 Calculadora YIKUN</h2><p>Presupuestos rápidos para producción</p></div>
 <div class="content">
  <div class="box">
   <label>Tipo de trabajo</label>
   <select id="tipo" onchange="campos()">
    <option value="145sin">Bandera 145 Sin Costura</option>
    <option value="145con">Bandera 145 Con Costura</option>
    <option value="200">Bandera 2.00</option>
    <option value="290">Bandera 2.90</option>
    <option value="430">Bandera 4.30</option>
    <option value="banner">Banner</option>
    <option value="luminoso">Banner Luminoso</option>
    <option value="vinilo">Vinilo</option>
    <option value="afiche">Afiche</option>
   </select>
  </div>

  <div id="largoBox" class="box">
   <label>Largo en metros</label>
   <input id="largo" type="number" step="0.01" placeholder="Ej: 6.50">
  </div>

  <div id="anchoBox" class="box hide">
   <div class="grid">
    <div><label>Ancho</label><input id="ancho" type="number" step="0.01" placeholder="Ej: 1.45"></div>
    <div><label>Alto</label><input id="alto" type="number" step="0.01" placeholder="Ej: 2"></div>
   </div>
  </div>

  <button class="btn-main" onclick="calcular()">CALCULAR</button>
  <div id="res">$0</div>
  <button class="btn-line" onclick="copiar()">📋 Copiar Presupuesto</button>
  <button class="btn-dark" onclick="wa()">📲 WhatsApp</button>
  <div class="note">Presupuesto válido por 7 días</div>
 </div>
</div>

<script>
const CFG={
 '145sin':{e:.5,m:13000,d:12000,an:1.45,n:'Bandera 145 Sin Costura'},
 '145con':{e:.5,m:13000,d:12000,c:3000,an:1.45,p:1,lat:2,u:0,n:'Bandera 145 Con Costura'},
 '200':{e:.2,m:13000,d:12000,c:3000,an:2.00,p:2,lat:4,u:1,n:'Bandera 2.00'},
 '290':{e:.5,m:13000,d:12000,c:3000,an:2.90,p:2,lat:4,u:1,n:'Bandera 2.90'},
 '430':{e:.8,m:13000,d:12000,c:3000,an:4.30,p:3,lat:6,u:2,n:'Bandera 4.30'},
 'banner':{e:.5,m:12000,d:12000,n:'Banner'},
 'luminoso':{e:.2,m:20000,d:12000,n:'Banner Luminoso'},
 'vinilo':{e:.2,m:12000,d:12000,n:'Vinilo'},
 'afiche':{e:.2,m:9500,d:12000,n:'Afiche'}
};
let texto='';
function campos(){let t=tipo.value,b=['banner','luminoso','vinilo','afiche'].includes(t);anchoBox.className=b?'box':'box hide';largoBox.className=b?'box hide':'box';res.innerHTML='$0';texto=''}
function red(v){return Math.ceil(v/1000)*1000}
function money(v){return v.toLocaleString('es-AR')}
function calcular(){
 let t=tipo.value,c=CFG[t],total=0,med='';
 if(['banner','luminoso','vinilo','afiche'].includes(t)){
  let a=parseFloat(ancho.value),h=parseFloat(alto.value); if(!a||!h){res.innerHTML='Completar medidas';return}
  total=red(((a*h)+c.e)*c.m+c.d); med=a.toFixed(2)+' x '+h.toFixed(2);
 }else{
  let l=parseFloat(largo.value); if(!l){res.innerHTML='Completar largo';return}
  if(c.c){
   let tela=(l*c.p)+c.e;
   let laterales=1.45*c.lat;
   let uniones=l*c.u;
   let bordes=l*2;
   let costura=laterales+uniones+bordes+c.e;
   total=red((tela*c.m)+(costura*c.c)+c.d);
  }else{
   let tela=l+c.e; total=red((tela*c.m)+c.d);
  }
  med=c.an.toFixed(2)+' x '+l.toFixed(2);
 }
 res.innerHTML='$'+money(total);
 texto='📋 *PRESUPUESTO YIKUN* 📋\n\n📦 *PEDIDO:* '+c.n+'\n\n📐 *MEDIDA:* '+med+'\n\n💰 *TOTAL:* $'+money(total)+'\n\n⚠️ *PRESUPUESTO VÁLIDO 7 DÍAS* ⚠️';
}
function copiar(){if(!texto){alert('Primero calculá un presupuesto.');return}navigator.clipboard.writeText(texto);alert('Copiado')}
function wa(){if(!texto){alert('Primero calculá un presupuesto.');return}window.open('https://wa.me/?text='+encodeURIComponent(texto))}
</script>
</body>
</html>
