<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Calculadora YIKUN</title>
<style>
:root{--azul:#00182E;--verde:#ACEC00;--blanco:#fff;--negro:#111;--gris:#eef2f5}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--azul);color:var(--blanco);padding:18px}
.app{max-width:520px;margin:auto}
.header{padding:18px 4px 14px;text-align:center}
.header h1{margin:0;font-size:26px;letter-spacing:.3px}
.header p{margin:8px 0 0;opacity:.8;font-size:14px}
.card{background:var(--blanco);color:var(--negro);border-radius:22px;padding:18px;box-shadow:0 18px 45px rgba(0,0,0,.28)}
.group{margin-bottom:14px}
label{display:block;font-weight:700;margin:0 0 7px;font-size:14px}
select,input{width:100%;padding:14px 13px;border:1px solid #d9dfe6;border-radius:14px;background:#f8fafc;font-size:16px;outline:none}
select:focus,input:focus{border-color:var(--verde);box-shadow:0 0 0 3px rgba(172,236,0,.25)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{width:100%;border:0;border-radius:15px;padding:14px;margin-top:10px;font-size:16px;font-weight:800;cursor:pointer;background:var(--verde);color:var(--negro)}
.btn.sec{background:var(--azul);color:var(--blanco)}
.result{margin-top:16px;background:var(--gris);border-radius:18px;padding:16px;min-height:70px;border-left:6px solid var(--verde)}
.total{font-size:26px;font-weight:900;margin:0 0 8px}
.detalle{font-size:14px;line-height:1.45;color:#333;white-space:pre-line}
.note{font-size:12px;color:#667;margin-top:10px;text-align:center}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>📋 Calculadora YIKUN</h1>
    <p>Presupuestos rápidos con cálculo de paños y costura</p>
  </div>

  <div class="card">
    <div class="group">
      <label>Tipo de trabajo</label>
      <select id="tipo" onchange="campos()">
        <option value="145sin">Bandera 1.45 Sin Costura</option>
        <option value="145con">Bandera 1.45 Con Costura</option>
        <option value="200">Bandera 2.00</option>
        <option value="290">Bandera 2.90</option>
        <option value="430">Bandera 4.30</option>
        <option value="banner">Banner</option>
        <option value="luminoso">Banner Luminoso</option>
        <option value="vinilo">Vinilo</option>
        <option value="afiche">Afiche</option>
      </select>
    </div>

    <div id="largoBox" class="group">
      <label>Largo en metros</label>
      <input id="largo" type="number" step="0.01" placeholder="Ej: 5">
    </div>

    <div id="anchoBox" style="display:none">
      <div class="row">
        <div class="group">
          <label>Ancho</label>
          <input id="ancho" type="number" step="0.01" placeholder="Ej: 1.45">
        </div>
        <div class="group">
          <label>Alto</label>
          <input id="alto" type="number" step="0.01" placeholder="Ej: 2">
        </div>
      </div>
    </div>

    <button class="btn" onclick="calcular()">CALCULAR</button>
    <div id="res" class="result">Ingresá las medidas y calculá el presupuesto.</div>
    <button class="btn sec" onclick="copiar()">📋 Copiar Presupuesto</button>
    <button class="btn sec" onclick="wa()">📲 WhatsApp</button>
    <div class="note">Presupuesto válido por 7 días.</div>
  </div>
</div>

<script>
const PAÑO = 1.45;
const CFG = {
  '145sin': {e:.50,m:13000,d:12000,c:0,paños:1,n:'Bandera 1.45 Sin Costura'},
  '145con': {e:.50,m:13000,d:12000,c:3000,paños:1,n:'Bandera 1.45 Con Costura'},
  '200':    {e:.20,m:13000,d:12000,c:3000,paños:2,n:'Bandera 2.00'},
  '290':    {e:.50,m:13000,d:12000,c:3000,paños:2,n:'Bandera 2.90'},
  '430':    {e:.80,m:13000,d:12000,c:3000,paños:3,n:'Bandera 4.30'},
  'banner':   {e:.50,m:12000,d:12000,n:'Banner'},
  'luminoso': {e:.20,m:20000,d:12000,n:'Banner Luminoso'},
  'vinilo':   {e:.20,m:12000,d:12000,n:'Vinilo'},
  'afiche':   {e:.20,m:9500,d:12000,n:'Afiche'}
};
let texto = '';

function campos(){
  let t = tipo.value;
  let plano = ['banner','luminoso','vinilo','afiche'].includes(t);
  anchoBox.style.display = plano ? 'block' : 'none';
  largoBox.style.display = plano ? 'none' : 'block';
  res.innerHTML = 'Ingresá las medidas y calculá el presupuesto.';
  texto = '';
}
function money(v){return v.toLocaleString('es-AR')}
function redondear(v){return Math.ceil(v/1000)*1000}

function calcular(){
  let t = tipo.value, c = CFG[t], total = 0, med = '', detalle = '';

  if(['banner','luminoso','vinilo','afiche'].includes(t)){
    let a = parseFloat(ancho.value), h = parseFloat(alto.value);
    if(!a || !h){res.innerHTML='Ingresá ancho y alto.';return}
    let metros = (a * h) + c.e;
    let material = metros * c.m;
    total = redondear(material + c.d);
    med = a.toFixed(2) + ' x ' + h.toFixed(2);
    detalle = 'Material: ' + metros.toFixed(2) + ' m² x $' + money(c.m) + ' = $' + money(material) +
              '\nBase: $' + money(c.d);
  }else{
    let l = parseFloat(largo.value);
    if(!l){res.innerHTML='Ingresá el largo.';return}

    let largoConExcedente = l + c.e;
    let anchoPorPanos = c.paños * PAÑO;
    let metrosMaterial = (l * c.paños) + c.e;
    let material = metrosMaterial * c.m;
    let costuraMetros = 0, costura = 0;

    if(c.c){
      costuraMetros = (largoConExcedente * 2) + (anchoPorPanos * 2);
      costura = costuraMetros * c.c;
    }

    total = redondear(material + costura + c.d);
    med = anchoPorPanos.toFixed(2) + ' x ' + l.toFixed(2);
    detalle = 'Paños: ' + c.paños + ' de 1.45 m' +
              '\nExcedente: ' + c.e.toFixed(2) + ' m' +
              '\nMaterial: ' + metrosMaterial.toFixed(2) + ' m x $' + money(c.m) + ' = $' + money(material) +
              (c.c ? '\nCostura: ' + costuraMetros.toFixed(2) + ' m x $' + money(c.c) + ' = $' + money(costura) : '') +
              '\nBase: $' + money(c.d);
  }

  res.innerHTML = '<p class="total">Total: $' + money(total) + '</p><div class="detalle">' + detalle + '</div>';
  texto = '📋 *PRESUPUESTO YIKUN* 📋\n\n' +
          '📦 *PEDIDO:* ' + c.n + '\n\n' +
          '📐 *MEDIDA:* ' + med + '\n\n' +
          '💰 *TOTAL:* $' + money(total) + '\n\n' +
          '⚠️ *PRESUPUESTO VÁLIDO 7 DÍAS* ⚠️';
}
function copiar(){
  if(!texto){alert('Primero calculá un presupuesto.');return}
  navigator.clipboard.writeText(texto);alert('Copiado');
}
function wa(){
  if(!texto){alert('Primero calculá un presupuesto.');return}
  window.open('https://wa.me/?text=' + encodeURIComponent(texto));
}
</script>
</body>
</html>
